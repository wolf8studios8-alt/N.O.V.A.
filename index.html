<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>N.O.V.A. - OS v3.5</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --main-cyan: #4facfe; --glow-cyan: rgba(79, 172, 254, 0.6); --bg-dark: #05080f; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: var(--bg-dark); color: var(--main-cyan); font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        #n-os-desktop { width: 100%; height: 100%; position: relative; display: flex; flex-direction: column; }
        #n-os-workspace { flex-grow: 1; position: relative; z-index: 1; }
        #hologram-3d-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.3; pointer-events: none; }
        
        #status-console { position: absolute; top: 10px; left: 10px; width: 320px; height: 120px; background: rgba(0,0,0,0.8); border-radius: 5px; border: 1px solid rgba(79, 172, 254, 0.3); padding: 10px; font-family: 'Courier New', monospace; font-size: 0.8rem; overflow-y: auto; z-index: 100; pointer-events: none;}
        
        .n-os-window { position: absolute; background: rgba(10, 15, 26, 0.95); border: 1px solid var(--main-cyan); border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); display: flex; flex-direction: column; z-index: 500; min-width: 300px; min-height: 250px;}
        .window-header { height: 30px; background: rgba(0,0,0,0.8); border-bottom: 1px solid rgba(79, 172, 254, 0.4); display: flex; align-items: center; justify-content: space-between; padding: 0 10px; cursor: move; }
        .window-title { font-size: 0.8rem; font-weight: bold; color: #fff; }
        .win-close { width: 15px; height: 15px; border-radius: 50%; border: none; background: #ff5f56; cursor: pointer; }
        .window-content { flex-grow: 1; position: relative; overflow: auto; color: white; padding: 10px;}
        .window-resizer { position: absolute; bottom: 0; right: 0; width: 15px; height: 15px; cursor: se-resize; }
        
        #bottom-interface { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 800px; display: flex; flex-direction: column; gap: 10px; z-index: 1000; }
        #command-line { display: flex; background: rgba(0,0,0,0.8); border: 1px solid var(--main-cyan); border-radius: 25px; padding: 5px 15px; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        #cmd-input { flex-grow: 1; background: transparent; border: none; color: #fff; font-size: 1rem; outline: none; padding: 10px; font-family: 'Segoe UI', sans-serif;}
        #cmd-input::placeholder { color: rgba(79, 172, 254, 0.5); }
        .cmd-btn { background: transparent; border: none; color: var(--main-cyan); cursor: pointer; padding: 5px 10px; transition: 0.3s; display: flex; align-items: center; justify-content: center;}
        .cmd-btn:hover { color: #fff; text-shadow: 0 0 10px var(--main-cyan); }
        .listening { color: #00ff88 !important; animation: pulse 1.5s infinite; }

        #file-inspector { position: absolute; top: 140px; left: 10px; width: 250px; height: calc(100% - 220px); background: rgba(10, 15, 26, 0.8); border: 1px solid rgba(79, 172, 254, 0.3); border-radius: 8px; z-index: 100; display: flex; flex-direction: column; backdrop-filter: blur(5px); transition: 0.3s; transform: translateX(-110%); }
        #file-inspector.open { transform: translateX(0); }
        .inspector-header { padding: 10px; background: rgba(0,0,0,0.5); border-bottom: 1px solid var(--main-cyan); font-weight: bold; color: #fff; display: flex; justify-content: space-between;}
        #drop-zone { flex-grow: 1; border: 2px dashed rgba(79, 172, 254, 0.3); margin: 10px; border-radius: 8px; display: flex; justify-content: center; align-items: center; color: rgba(255,255,255,0.5); text-align: center; padding: 20px; transition: 0.3s;}
        #drop-zone.dragover { background: rgba(79, 172, 254, 0.2); border-color: var(--main-cyan); color: #fff; }
        
        #arc-launcher-btn { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); width: 60px; height: 60px; border-radius: 50%; background: rgba(0,0,0,0.8); border: 2px solid var(--main-cyan); color: var(--main-cyan); display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 2000; transition: 0.3s; }
        #arc-menu-container { position: absolute; right: 50px; top: 50%; width: 300px; height: 600px; transform: translateY(-50%); pointer-events: none; z-index: 1999; }
        .arc-item { position: absolute; width: 50px; height: 50px; border-radius: 50%; background: rgba(10, 15, 26, 0.9); border: 1px solid var(--main-cyan); display: flex; justify-content: center; align-items: center; color: white; cursor: pointer; pointer-events: auto; opacity: 0; transform: scale(0); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fflate@0.8.2/umd/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
</head>
<body>
    <div id="n-os-desktop">
        <div id="status-console">> N-OS v3.5 Inicializado.<br></div>
        <div id="file-inspector">
            <div class="inspector-header"><span>Inspector CAD</span><i class="material-icons" id="toggle-inspector" style="cursor:pointer">chevron_left</i></div>
            <div id="drop-zone">Arrastre archivos .stl, .fbx o .glb aquí para inspeccionar</div>
        </div>
        <div id="n-os-workspace"></div>
        <div id="arc-launcher-btn"><i class="material-icons" style="font-size: 32px;">apps</i></div>
        <div id="arc-menu-container"></div>
        <div id="bottom-interface">
            <div id="command-line">
                <button id="btn-inspector" class="cmd-btn" title="Inspector"><i class="material-icons">folder_open</i></button>
                <input type="text" id="cmd-input" placeholder="Escriba su comando para Gemini..." autocomplete="off">
                <button id="btn-mic" class="cmd-btn" title="Voz"><i class="material-icons">mic</i></button>
                <button id="btn-send" class="cmd-btn" title="Enviar"><i class="material-icons">send</i></button>
            </div>
        </div>
    </div>
    
    <script src="js/window_manager.js"></script>
    <script src="js/ui_effects.js"></script>
    <script src="js/file_inspector.js"></script>
    <script src="js/workspace_tools.js"></script>
    <script src="js/gemini_core.js"></script>
</body>
</html>
