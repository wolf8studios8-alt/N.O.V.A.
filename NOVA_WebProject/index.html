<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>N.O.V.A. Virtual Mat</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #0a0f1a; color: #4facfe;
            font-family: 'Courier New', Courier, monospace;
            background-image: 
                linear-gradient(rgba(79, 172, 254, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(79, 172, 254, 0.1) 1px, transparent 1px);
            background-size: 20px 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            height: 100vh; overflow: hidden;
        }
        #ui-container { text-align: center; z-index: 10; margin-top: 20px; }
        h1 { font-size: 2rem; text-transform: uppercase; letter-spacing: 3px; text-shadow: 0 0 10px rgba(79, 172, 254, 0.5); }
        #status-log {
            width: 90vw; max-width: 600px; height: 100px; background: rgba(0, 0, 0, 0.6);
            border: 1px solid #4facfe; border-radius: 5px; padding: 10px; margin: 10px auto;
            overflow-y: auto; text-align: left; box-shadow: inset 0 0 10px rgba(79, 172, 254, 0.2); font-size: 0.9rem;
        }
        .btn-jarvis {
            background: rgba(10, 15, 26, 0.8); border: 2px solid #4facfe; color: #4facfe;
            padding: 10px 20px; font-size: 1rem; cursor: pointer; border-radius: 5px;
            transition: all 0.3s ease; text-transform: uppercase; margin: 5px;
        }
        .btn-jarvis:active { background: rgba(79, 172, 254, 0.3); transform: scale(0.95); }
        .listening { border-color: #00ff88; color: #00ff88; box-shadow: 0 0 15px rgba(0, 255, 136, 0.4); }
        
        /* Contenedor del Visor 3D */
        #hologram-container {
            width: 90vw; max-width: 800px; height: 50vh; margin-top: 10px;
            border: 1px solid rgba(79, 172, 254, 0.3); border-radius: 10px;
            background: radial-gradient(circle, rgba(79, 172, 254, 0.05) 0%, rgba(0,0,0,0) 70%);
            position: relative;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div id="ui-container">
        <h1>N.O.V.A. Virtual Mat</h1>
        <button id="btn-mic" class="btn-jarvis">Micrófono</button>
        <button id="btn-load-stl" class="btn-jarvis">Proyectar Modelo de Prueba</button>
        <div id="status-log">> Sistemas en línea...<br></div>
    </div>
    
    <div id="hologram-container"></div>

    <script src="js/jarvis_core.js"></script>
    <script src="js/hologram_renderer.js"></script>
</body>
</html>
